{% load allauth %}
<div class="rounded-md p-3 mb-4 text-sm
    {% if 'error' in attrs.tags %}bg-red-50 text-red-700 border border-red-200
    {% elif 'warning' in attrs.tags %}bg-yellow-50 text-yellow-700 border border-yellow-200
    {% elif 'success' in attrs.tags %}bg-green-50 text-green-700 border border-green-200
    {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
    {% slot default %}{% endslot %}
</div>
