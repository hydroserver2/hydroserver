{% load allauth %}
{% if attrs.href %}
<a href="{{ attrs.href }}"
   class="inline-flex w-full items-center justify-center transition-all duration-150 focus:outline-none
   {% if attrs.tags and 'login' in attrs.tags %}
       min-h-14 rounded-xl border px-6 py-4 text-base font-medium focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white
       {% if 'outline' in attrs.tags %}
           border-gray-300 bg-white text-gray-700 hover:bg-gray-50
       {% else %}
           border-primary bg-primary text-white shadow-elevation-2 hover:bg-primary-dark
       {% endif %}
   {% else %}
       rounded-full px-6 py-2.5 text-sm font-medium shadow-sm focus-visible:ring-2 focus-visible:ring-offset-2
       {% if 'outline' in attrs.tags %}
           border border-primary bg-transparent text-primary hover:bg-primary-light focus-visible:ring-primary
       {% else %}
           bg-primary text-white shadow hover:bg-primary-dark hover:shadow-md focus-visible:ring-primary
       {% endif %}
   {% endif %}">
    {% slot %}{% endslot %}
</a>
{% else %}
<button type="{{ attrs.type|default:'submit' }}"
        {% if attrs.form %}form="{{ attrs.form }}"{% endif %}
        {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
        class="inline-flex w-full items-center justify-center cursor-pointer transition-all duration-150 focus:outline-none
        {% if attrs.tags and 'login' in attrs.tags %}
            min-h-14 rounded-xl border px-6 py-4 text-base font-medium focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white
            {% if 'danger' in attrs.tags %}
                border-red-600 bg-red-600 text-white shadow-elevation-2 hover:bg-red-700
            {% elif 'outline' in attrs.tags %}
                border-gray-300 bg-white text-gray-700 hover:bg-gray-50
            {% elif 'secondary' in attrs.tags %}
                border-gray-300 bg-white text-gray-700 hover:bg-gray-50
            {% else %}
                border-primary bg-primary text-white shadow-elevation-2 hover:bg-primary-dark
            {% endif %}
        {% else %}
            rounded-full px-6 py-2.5 text-sm font-medium focus-visible:ring-2 focus-visible:ring-offset-2
            {% if 'danger' in attrs.tags %}
                bg-red-600 text-white shadow hover:bg-red-700 hover:shadow-md focus-visible:ring-red-600
            {% elif 'outline' in attrs.tags %}
                border border-gray-300 bg-transparent text-gray-700 hover:bg-gray-50 focus-visible:ring-gray-400
            {% elif 'secondary' in attrs.tags %}
                bg-gray-100 text-gray-700 hover:bg-gray-200 focus-visible:ring-gray-400
            {% else %}
                bg-primary text-white shadow hover:bg-primary-dark hover:shadow-md focus-visible:ring-primary
            {% endif %}
        {% endif %}">
    {% slot %}{% endslot %}
</button>
{% endif %}
