# === Quality Control Test Data ===
#
# To avoid disturbing the global datastream/processing-level listings used by
# other sta tests, this fixture reuses several existing datastreams from
# test_datastreams.yaml rather than introducing new ones wherever possible:
#
#   - SOURCE_H1 (source for QC history H1)
#       = Private Datastream 5 (1c9a797e..., Private Assigned Processing Level)
#   - MANAGED_NO_SOURCE (managed datastream for QC history H2, which has no source)
#       = Private Datastream 4 (dd1f9293..., Private Assigned Processing Level)
#   - H3_MANAGED (managed datastream for QC history H3; also used as the
#     "same processing level as source" argument in QCHistory.create() validation tests)
#       = Private Datastream 6 (42e08eea..., Private Assigned Processing Level)
#   - H3_SOURCE (source datastream for QC history H3)
#       = Private Datastream 7 (9f96957b..., Private Assigned Processing Level)
#   - MANAGED_PUBLIC (used as the "different workspace" argument in
#     QCHistory.create() validation tests)
#       = Public Datastream 1 (27c70b41..., Public Assigned Processing Level)
#
# Two new datastreams are added, both in the Private workspace and using the
# Private Processing Level so they differ from SOURCE_H1's processing level:
#
#   - QC Managed Datastream (MANAGED_H1, has QC history H1, with observations
#     for checksum testing)
#   - QC Managed Datastream (No History) (MANAGED_FRESH, used for
#     QCHistory.create() success tests)
#
# QC History 1 (H1): managed=MANAGED_H1, source=SOURCE_H1. Has one committed
#   session covering 2025-01-01 00:00-06:00.
#
# QC History 2 (H2): managed=MANAGED_NO_SOURCE, source=null.
#
# QC History 3 (H3): managed/source pair dedicated to QC operation tests, with one
#   in-progress session and two operations.

