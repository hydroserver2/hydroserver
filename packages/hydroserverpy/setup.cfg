[metadata]
name = hydroserverpy
version = 1.10.0
description = A Python client for managing HydroServer data
long_description = file: README.md
long_description_content_type = text/markdown
url = https://github.com/hydroserver2/hydroserver/tree/main/packages/hydroserverpy
project_urls =
    Source = https://github.com/hydroserver2/hydroserver
    Issues = https://github.com/hydroserver2/hydroserver/issues
author = Kenneth Lippold
author_email = kenneth.lippold@usu.edu
license = BSD-3-Clause
keywords = hydroserver, hydroinformatics, api, rest
classifiers =
    Intended Audience :: Developers
    License :: OSI Approved :: BSD License
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Topic :: Internet :: WWW/HTTP

[options]
package_dir=
    =src
packages = find:
zip_safe = True
python_requires = >=3.9, <4
install_requires =
    requests >= 2
    pydantic >= 2.6
    pydantic[email] >= 2.6
    pandas >= 2.1
    numpy >= 1.22.4
    scipy >= 1.10.0
    pyyaml >= 5
    simplejson >= 3
    python-crontab >= 3
    python-dateutil >= 2.8.2
    croniter >= 2.0.1
    jmespath >= 1.0.1
    pytz >= 2020.1

[options.extras_require]
docs =
    sphinx_autodoc_typehints

[options.packages.find]
where=src
