document: HydroServer Standard Release Testing Process
last_reviewed: 2026-03-16
sections:
  - id: general
    status: automated
    mode: playwright
    coverage:
      - tests/e2e/specs/general.spec.ts
    cases:
      - "Default entry route loads and redirects to Browse monitoring sites."
      - "HydroServer logo returns the user to Browse monitoring sites."
  - id: browse
    status: partial
    mode: playwright-plus-manual
    coverage:
      - tests/e2e/specs/general.spec.ts
      - tests/e2e/specs/visualization.spec.ts
    manual_cases:
      - "Map popup interaction and site-details link from marker overlay."
      - "OpenLayers map pan and zoom controls."
    notes:
      - "Anonymous Browse loading and filter shell are covered in Playwright; marker-level OpenLayers interactions remain manual because they are canvas-driven and not exposed with stable accessibility hooks."
  - id: login
    status: partial
    mode: playwright-plus-manual
    coverage:
      - tests/e2e/specs/auth.spec.ts
      - tests/e2e/specs/account.spec.ts
    manual_cases:
      - "Email verification flow for username/password sign-up."
      - "External identity provider flows such as UtahID or Google."
    notes:
      - "Browser login redirect and logged-out protection are automated. Provider-auth and email flows require external systems and stay in manual release signoff."
  - id: account
    status: automated
    mode: playwright
    coverage:
      - tests/e2e/specs/account.spec.ts
    cases:
      - "Account page loads for an authenticated user."
      - "Account editing persists field changes."
      - "Removing organization affiliation shows the warning and removes organization data."
      - "Account deletion logs the user out and invalidates subsequent login."
  - id: about
    status: automated
    mode: playwright
    coverage:
      - tests/e2e/specs/general.spec.ts
    cases:
      - "About page loads successfully."
  - id: your-sites
    status: partial
    mode: playwright-plus-pytest
    coverage:
      - tests/e2e/specs/auth.spec.ts
      - tests/e2e/specs/account.spec.ts
      - tests/e2e/specs/sites.spec.ts
      - tests/e2e/specs/workspaces.spec.ts
      - django/tests/iam/services/test_workspace.py
      - django/tests/iam/services/test_collaborator.py
    manual_cases:
      - "Map extent/zoom behavior on the Your Sites page."
      - "Site photo drag-and-drop verification."
      - "Key/value metadata filtering from the Your Sites filter drawer."
    notes:
      - "Workspace create, update validation, delete validation, privacy, transfer visibility, empty-workspace onboarding, and collaborator add/update/remove flows are automated. Ownership semantics remain strongly covered in pytest, while map and metadata-filter interactions stay manual."
  - id: site-details
    status: partial
    mode: playwright-plus-pytest
    coverage:
      - tests/e2e/specs/sites.spec.ts
      - django/tests/sta/services/test_thing.py
      - django/tests/sta/services/test_datastream.py
    manual_cases:
      - "Sparkline color and time-window interactions."
      - "Direct map interaction on the site-details page."
    notes:
      - "Public site-details rendering, site edit, privacy toggling, site photo add/remove, site delete, and datastream create/update/delete are automated in Playwright against a dedicated mutable seeded site. Remaining map and chart behaviors stay manual, with API semantics reinforced in pytest."
  - id: visualize-data
    status: partial
    mode: playwright-plus-manual
    coverage:
      - tests/e2e/specs/visualization.spec.ts
    manual_cases:
      - "Plot rendering correctness for multi-series axes and brush zoom."
      - "Plot PNG export validation."
      - "Summary-statistics plot mode and reset zoom behavior."
    notes:
      - "The current automated gate covers visualization bootstrap, seeded datastream filtering, selected-only table state, summary-mode toggling, copied URL restoration, datastream metadata modal actions, and CSV/ZIP downloads. Rich chart correctness and plot-image export still need more dedicated hooks before they can be promoted to reliable CI gates."
  - id: metadata
    status: partial
    mode: playwright-plus-pytest
    coverage:
      - tests/e2e/specs/metadata.spec.ts
      - packages/hydroserverpy/tests
      - django/tests/sta/services
    manual_cases:
      - "UI CRUD workflows for each metadata tab end-to-end."
    notes:
      - "Page loading, tab availability, and representative workspace sensor CRUD are automated in Playwright. The create/update/delete semantics for sensors, observed properties, processing levels, units, result qualifiers, and datastream relationships are already enforced more deeply in Python/API test suites."
  - id: streaming-data-loader
    status: manual
    mode: external
    manual_cases:
      - "SDL installation and instance registration."
      - "SDL authentication with username/password and API keys."
      - "Multi-workspace SDL configuration."
    notes:
      - "These cases depend on the external Streaming Data Loader runtime and are intentionally excluded from CI until the SDL integration is containerized inside the monorepo."
  - id: orchestration
    status: partial
    mode: playwright-plus-pytest-plus-manual
    coverage:
      - tests/e2e/specs/orchestration.spec.ts
      - django/tests/etl
    manual_cases:
      - "Local file ingestion through SDL."
      - "Scheduler timing semantics and status propagation from SDL."
    notes:
      - "The HydroServer orchestration UI shell and seeded task visibility are automated. Deep task execution still depends on SDL and remains an external gate."
  - id: hydroshare
    status: manual
    mode: external
    manual_cases:
      - "HydroShare connect/disconnect OAuth flow."
      - "Resource creation, linking, archival, and unlinking."
    notes:
      - "These cases require HydroShare credentials, browser popups, and side effects in an external service."
  - id: api-and-hydroserverpy
    status: automated
    mode: pytest
    coverage:
      - django/tests
      - packages/hydroserverpy/tests
    notes:
      - "The document's API and hydroserverpy checklist is covered by the existing pytest suites and by the root release-test runner."
