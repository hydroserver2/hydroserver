name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  release:
    types: [created]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json

      - name: Install docs dependencies
        working-directory: apps/docs
        run: npm ci

      - name: Build docs
        working-directory: apps/docs
        run: npm run docs:build

  hydroserver-ts:
    name: TypeScript Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/hydroserver-ts/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r django/requirements.txt
          pip install -e packages/hydroserverpy

      - name: Install client dependencies
        working-directory: packages/hydroserver-ts
        run: npm ci

      - name: Verify TypeScript client contract artifacts
        working-directory: packages/hydroserver-ts
        run: npm run check:contract

      - name: Run TypeScript client tests
        working-directory: packages/hydroserver-ts
        run: npm run coverage

      - name: Build TypeScript client
        working-directory: packages/hydroserver-ts
        run: npm run build

  data-management:
    name: Data Management App 80% Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/data-management/package-lock.json
            packages/hydroserver-ts/package-lock.json

      - name: Install TypeScript client dependencies
        working-directory: packages/hydroserver-ts
        run: npm ci

      - name: Install app dependencies
        working-directory: apps/data-management
        run: npm ci

      - name: Configure app environment
        working-directory: apps/data-management
        run: |
          {
            echo "VITE_APP_GOOGLE_MAPS_API_KEY="
            echo "VITE_APP_GOOGLE_MAPS_MAP_ID="
            echo "VITE_APP_PROXY_BASE_URL=http://127.0.0.1:8000"
            echo "VITE_HYDROSERVER_CLIENT_LOCAL=1"
            echo "VITE_HYDROSERVER_CLIENT_PATH=../../packages/hydroserver-ts/src"
          } > .env

      - name: Run app tests
        working-directory: apps/data-management
        run: npm run coverage

      - name: Build app
        working-directory: apps/data-management
        run: npm run build

  qc-app:
    name: QC App Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/qc-app/package-lock.json
            packages/qc-utils/package-lock.json

      - name: Install QC utils dependencies
        working-directory: packages/qc-utils
        run: npm ci --workspaces=false

      - name: Build QC utils
        working-directory: packages/qc-utils
        run: npm run build

      - name: Install QC app dependencies
        working-directory: apps/qc-app
        run: npm ci --workspaces=false

      - name: Install local QC utils package
        working-directory: apps/qc-app
        run: npm install ../../packages/qc-utils --no-save --package-lock=false --workspaces=false

      - name: Run QC app typecheck
        working-directory: apps/qc-app
        run: npm run typecheck

      - name: Run QC app coverage
        working-directory: apps/qc-app
        run: npm run coverage

      - name: Build QC app
        working-directory: apps/qc-app
        run: npm run build

  hydroserverpy:
    name: Python Client
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python client dependencies
        working-directory: packages/hydroserverpy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run Python client tests
        working-directory: packages/hydroserverpy
        run: python -m pytest --import-mode=append tests/

  api:
    name: API Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hydroserver
          POSTGRES_USER: hsdbadmin
          POSTGRES_PASSWORD: admin
        options: >-
          --health-cmd "pg_isready -U hsdbadmin -d hydroserver"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r django/requirements.txt
          pip install -e packages/hydroserverpy
          pip install pytest pytest-django pytest-cov

      - name: Run API test suite
        working-directory: django
        env:
          DATABASE_URL: postgresql://hsdbadmin:admin@127.0.0.1:5432/hydroserver
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          SMTP_URL: smtp://127.0.0.1:1025
        run: python -m pytest

  e2e-data-management:
    name: Data Management E2E
    runs-on: ubuntu-latest
    env:
      E2E_DATABASE_URL: postgresql://hsdbadmin:admin@127.0.0.1:5432/hydroserver_e2e_${{ github.run_id }}_${{ github.run_attempt }}
      E2E_ADMIN_DATABASE_URL: postgresql://hsdbadmin:admin@127.0.0.1:5432/postgres

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hydroserver
          POSTGRES_USER: hsdbadmin
          POSTGRES_PASSWORD: admin
        options: >-
          --health-cmd "pg_isready -U hsdbadmin -d hydroserver"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/data-management/package-lock.json
            packages/hydroserver-ts/package-lock.json

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r django/requirements.txt
          pip install -e packages/hydroserverpy

      - name: Install TypeScript client dependencies
        working-directory: packages/hydroserver-ts
        run: npm ci

      - name: Install app dependencies
        working-directory: apps/data-management
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/data-management
        run: npx playwright install --with-deps chromium

      - name: Run data-management Playwright E2E suite
        working-directory: apps/data-management
        env:
          E2E_PYTHON: python
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-data-management
          path: |
            apps/data-management/playwright-report
            apps/data-management/test-results
          if-no-files-found: ignore

  e2e-qc-app:
    name: QC App E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/qc-app/package-lock.json

      - name: Install QC app dependencies
        working-directory: apps/qc-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/qc-app
        run: npx playwright install --with-deps chromium firefox

      - name: Run QC app Playwright E2E suite
        working-directory: apps/qc-app
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-qc-app
          path: |
            apps/qc-app/playwright-report
            apps/qc-app/test-results
          if-no-files-found: ignore

  trigger-release:
    name: Trigger Release Workflow
    runs-on: ubuntu-latest
    if: >-
      always() &&
      github.event_name == 'release' && (
        github.event.release.prerelease ||
        (!contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled'))
      )
    needs:
      [
        docs,
        hydroserver-ts,
        data-management,
        qc-app,
        hydroserverpy,
        api,
        e2e-data-management,
        e2e-qc-app,
      ]
    permissions:
      actions: write

    steps:
      - name: Trigger release workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: context.payload.release.target_commitish,
              inputs: {
                tag: context.payload.release.tag_name,
                prerelease: String(context.payload.release.prerelease),
              },
            });
